version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: plc_database
    environment:
      POSTGRES_USER: plcuser
      POSTGRES_PASSWORD: plcpass123
      POSTGRES_DB: plc_readings
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U plcuser"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
